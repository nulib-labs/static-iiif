AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: IIIF Collection Builder

Parameters:
  ServerlessIiifVersion:
    Type: String
    Default: "7.0.1"
  GitHubRepo:
    Type: String
    Description: "URL of your GitHub fork of this repo (e.g. https://github.com/your-org/static-iiif)"
  GitHubBranch:
    Type: String
    Default: main
  GitHubOAuthToken:
    Type: String
    NoEcho: true
    Description: "GitHub personal access token with repo scope (https://github.com/settings/tokens)"

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures:
      - arm64
    Timeout: 300
    MemorySize: 1025
    Environment:
      Variables: 
        SOURCE_BUCKET: !Sub "${AWS::StackName}-source"
        IIIF_BUCKET: !Sub "${AWS::StackName}-iiif"
        IIIF_BASE_URL: !Sub "https://${AWS::StackName}-iiif.s3.${AWS::Region}.amazonaws.com/iiif/output"

Resources:
  SourceBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    DependsOn: IIIFImageFunctionS3Permission
    Properties:
      BucketName: !Sub "${AWS::StackName}-source"
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: image/
            Function: !GetAtt IIIFImageFunction.Arn

  IIIFBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${AWS::StackName}-iiif"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - GET
            AllowedOrigins:
              - "*"

  IIIFBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref IIIFBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${AWS::StackName}-iiif/*"

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-users"
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${AWS::StackName}-web-client"
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  CognitoIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: !Sub "${AWS::StackName}-identity"
      AllowUnauthenticatedIdentities: false
      CognitoIdentityProviders:
        - ClientId: !Ref CognitoUserPoolClient
          ProviderName: !GetAtt CognitoUserPool.ProviderName

  CognitoAuthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "cognito-identity.amazonaws.com:aud": !Ref CognitoIdentityPool
              "ForAnyValue:StringLike":
                "cognito-identity.amazonaws.com:amr": authenticated
      Policies:
        - PolicyName: IIIFBucketRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub "arn:aws:s3:::${AWS::StackName}-iiif/*"
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !Sub "arn:aws:s3:::${AWS::StackName}-iiif"

  CognitoIdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref CognitoIdentityPool
      Roles:
        authenticated: !GetAtt CognitoAuthenticatedRole.Arn

  ManifestHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}"
              audience:
                - !Ref CognitoUserPoolClient
            IdentitySource: $request.header.Authorization
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - PUT
          - OPTIONS
        AllowHeaders:
          - "*"

  ManifestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-manifest-api"
      CodeUri: lambdas/manifest/
      Handler: index.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:ListBucket
              Resource: !Sub "arn:aws:s3:::${AWS::StackName}-iiif"
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
                - s3:HeadObject
              Resource: !Sub "arn:aws:s3:::${AWS::StackName}-iiif/*"
      Events:
        GetManifests:
          Type: HttpApi
          Properties:
            ApiId: !Ref ManifestHttpApi
            Path: /manifests
            Method: GET
        CreateManifest:
          Type: HttpApi
          Properties:
            ApiId: !Ref ManifestHttpApi
            Path: /manifests
            Method: POST
        GetManifestById:
          Type: HttpApi
          Properties:
            ApiId: !Ref ManifestHttpApi
            Path: /manifests/{id}
            Method: GET
        UpdateManifestItems:
          Type: HttpApi
          Properties:
            ApiId: !Ref ManifestHttpApi
            Path: /manifests/{id}/items
            Method: PUT

  IIIFImageFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-iiif-image"
      CodeUri: lambdas/iiif-image/
      Handler: index.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "arn:aws:s3:::${AWS::StackName}-source/*"
        - S3WritePolicy:
            BucketName: !Sub "${AWS::StackName}-iiif"

  IIIFImageFunctionS3Permission:
    Type: AWS::Lambda::Permission
    DependsOn: IIIFImageFunction
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref IIIFImageFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub "arn:aws:s3:::${AWS::StackName}-source"

  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Sub "${AWS::StackName}-ui"
      Repository: !Ref GitHubRepo
      OauthToken: !Ref GitHubOAuthToken
      BuildSpec: |
        version: 1
        frontend:
          phases:
            preBuild:
              commands:
                - npm ci --prefix ui
            build:
              commands:
                - echo "VITE_BACKEND=$VITE_BACKEND VITE_IIIF_BASE_URL=$VITE_IIIF_BASE_URL"
                - printf 'VITE_BACKEND=aws\nVITE_IIIF_BASE_URL=%s\n' "$VITE_IIIF_BASE_URL" > ui/.env.production
                - npm run build --prefix ui
          artifacts:
            baseDirectory: ui/dist
            files:
              - '**/*'
          cache:
            paths:
              - ui/node_modules/**/*
      EnvironmentVariables:
        - Name: VITE_BACKEND
          Value: aws
        - Name: VITE_IIIF_BASE_URL
          Value: !Sub "https://${IiifServer.Outputs.FunctionDomain}/iiif/2"
        - Name: VITE_MANIFEST_API_URL
          Value: !Sub "https://${ManifestHttpApi}.execute-api.${AWS::Region}.amazonaws.com/manifests"
        - Name: VITE_STORAGE_BUCKET
          Value: !Sub "${AWS::StackName}-iiif"
        - Name: VITE_STORAGE_REGION
          Value: !Ref AWS::Region
        - Name: VITE_STORAGE_IDENTITY_POOL_ID
          Value: !Ref CognitoIdentityPool
        - Name: VITE_COGNITO_USER_POOL_ID
          Value: !Ref CognitoUserPool
        - Name: VITE_COGNITO_CLIENT_ID
          Value: !Ref CognitoUserPoolClient

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      BranchName: !Ref GitHubBranch
      EnableAutoBuild: true

  IiifServer:
    Type: AWS::Serverless::Application
    Properties:
      Location:
        ApplicationId: arn:aws:serverlessrepo:us-east-1:625046682746:applications/serverless-iiif
        SemanticVersion: !Ref ServerlessIiifVersion
      Parameters:
        SourceBucket: !Ref IIIFBucket

Outputs:
  SourceBucketName:
    Value: !Sub "${AWS::StackName}-source"
  IIIFBucketName:
    Value: !Sub "${AWS::StackName}-iiif"
  IIIFImageFunctionArn:
    Value: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-iiif-image"
  IiifEndpoint:
    Value: !Sub "https://${IiifServer.Outputs.FunctionDomain}/iiif/2"
  UIEndpoint:
    Value: !Sub "https://${GitHubBranch}.${AmplifyApp.AppId}.amplifyapp.com"
  ManifestApiUrl:
    Value: !Sub "https://${ManifestHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  CognitoUserPoolId:
    Value: !Ref CognitoUserPool
  CognitoClientId:
    Value: !Ref CognitoUserPoolClient
  CognitoIdentityPoolId:
    Value: !Ref CognitoIdentityPool
